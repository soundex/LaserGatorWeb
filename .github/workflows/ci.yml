name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Block runtime JSON in git
        run: |
          if git ls-files --error-unmatch data/media-manifest.json data/events.json 2>/dev/null; then
            echo "ERROR: Runtime data files must not be committed."
            echo "Remove data/media-manifest.json and data/events.json from git."
            echo "Use data/*.example.json seeds and export/import bundles for content promotion."
            exit 1
          fi
          echo "Runtime JSON guard passed."

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Verify server starts
        run: |
          timeout 5 node server.js || test $? = 124
