<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — LaserGator</title>
  <meta name="description" content="Contact LaserGator to book a laser show. Call Paul or Milo, or send us a message about your event.">
  <link rel="icon" href="/assets/logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/contact.css">
</head>
<body data-page="contact">
  <div id="site-nav"></div>

  <section class="page-hero">
    <div class="container fade-in">
      <h1>Get in <span class="accent-cyan">Touch</span></h1>
      <p>Ready to book a show? We'd love to hear about your event.</p>
    </div>
  </section>

  <section class="section" id="book">
    <div class="container contact-layout">
      <div class="contact-info-block fade-in">
        <h3>Reach Us Directly</h3>
        <div class="contact-person">
          <h4>Milo Matthews</h4>
          <p class="role">Manager / Laserist</p>
          <a href="tel:9073439163">907-343-9163</a>
          <a href="mailto:milo@laser-gator.com">milo@laser-gator.com</a>
        </div>
        <div class="contact-person">
          <h4>Paul Mehner</h4>
          <p class="role">CEO / Laserist</p>
          <a href="tel:3607894424">360-789-4424</a>
          <a href="mailto:paul@laser-gator.com">paul@laser-gator.com</a>
        </div>
      </div>

      <div class="contact-form-card fade-in">
        <h3>Send a Message</h3>
        <form id="contact-form">
          <div class="form-group">
            <label for="name">Name *</label>
            <input type="text" id="name" name="name" required>
          </div>
          <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" required>
          </div>
          <div class="form-group">
            <label for="eventDate">Event Date</label>
            <input type="date" id="eventDate" name="eventDate">
          </div>
          <div class="form-group">
            <label for="venue">Venue / Location</label>
            <input type="text" id="venue" name="venue">
          </div>
          <div class="form-group">
            <label for="message">Message *</label>
            <textarea id="message" name="message" required placeholder="Tell us about your event, venue, and vision…"></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Send Message</button>
          <div id="form-status" class="form-status"></div>
        </form>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>
  <script src="/js/main.js"></script>
  <script src="/js/contact.js"></script>
</body>
</html>
